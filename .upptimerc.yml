# Hexr Runtime Status Page
# https://status.hexr.cloud
owner: hexrdev
repo: upptime

sites:
  # --- Public Endpoints ---
  - name: Cloud API
    url: https://api.hexr.cloud/health
    icon: https://hexr.dev/favicon.ico
    expectedStatusCodes:
      - 200

  - name: Dashboard
    url: https://app.hexr.cloud
    icon: https://hexr.dev/favicon.ico
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: OIDC Discovery
    url: https://oidc.hexr.cloud/.well-known/openid-configuration
    icon: https://hexr.dev/favicon.ico
    expectedStatusCodes:
      - 200

  - name: Documentation
    url: https://docs.hexr.dev
    icon: https://hexr.dev/favicon.ico
    expectedStatusCodes:
      - 200

  - name: Landing Page
    url: https://hexr.dev
    icon: https://hexr.dev/favicon.ico
    expectedStatusCodes:
      - 200

  # --- Runtime Services (external health endpoints) ---
  - name: Hexr Gateway
    url: https://api.hexr.cloud/gateway/health
    expectedStatusCodes:
      - 200
      - 404

  - name: Hexr Vault
    url: https://api.hexr.cloud/vault/health
    expectedStatusCodes:
      - 200
      - 404

  - name: Credential Injector
    url: https://api.hexr.cloud/cred-injector/health
    expectedStatusCodes:
      - 200
      - 404

  # --- Observability ---
  - name: Grafana
    url: https://api.hexr.cloud/grafana/api/health
    expectedStatusCodes:
      - 200
      - 302
      - 404

status-website:
  cname: status.hexr.cloud
  logoUrl: https://hexr.dev/favicon.ico
  name: Hexr Status
  theme: dark
  introTitle: "**Hexr** Runtime Status"
  introMessage: "Real-time health monitoring for the Hexr AI agent runtime platform. All checks run every 5 minutes via GitHub Actions."
  navbar:
    - title: Status
      href: /
    - title: Hexr Cloud
      href: https://app.hexr.cloud
    - title: Documentation
      href: https://docs.hexr.dev
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

i18n:
  activeIncidents: Current Incidents
  pastIncidents: Past Incidents
  pastIncidentsResolved: Resolved
  allSystemsOperational: All Systems Operational
  incidentReport: Incident Report

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "*/5 * * * *"
  uptime: "*/5 * * * *"
